<!DOCTYPE html>
<html lang="en">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=Cutive+Mono&family=Inconsolata:wdth,wght@112.5,200..900&family=Manufacturing+Consent&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Year Calendar with D3</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  </head>
  <body>
    <main class="page">
      <header>
        <h1>🐸 Visualizing Fait's Year 🐸</h1>
        <p>Audio engineering, DJ sets, and speaker manufacturing in 2026</p>
      </header>
      <section class="dashboard">
        <section id="calendar" class="calendar-panel"></section>
        <aside class="events-panel">
          <h2>Events</h2>
          <table class="events-table">
            <thead>
              <tr>
                <th>Date</th>
                <th>Event</th>
                <th>Location</th>
              </tr>
            </thead>
            <tbody id="events-list"></tbody>
          </table>
        </aside>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
